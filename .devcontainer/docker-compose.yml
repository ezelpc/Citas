services:
  db:
    image: postgres:16-alpine
    container_name: citas_db
    environment:
      - POSTGRES_USER=citas_user
      - POSTGRES_PASSWORD=citas_password
      - POSTGRES_DB=citas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citas_user -d citas"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: citas_app
    volumes:
      - ..:/workspace:cached
    ports:
      - "3000:3000"
      - "8081:8081"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=citas_user
      - DB_PASSWORD=citas_password
      - DB_NAME=citas
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

volumes:
  postgres_data: